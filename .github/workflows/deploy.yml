name: Build and publish to deploy branch

# Hostinger pulls this repo straight into public_html without running a build,
# so `main` (source only) is not servable. This builds the static export and
# force-pushes out/ to the `deploy` branch, which Hostinger is pointed at.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish out/ to deploy branch
        working-directory: out
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -f index.html || { echo "build produced no index.html"; exit 1; }
          git init -q -b deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Build ${GITHUB_SHA::7}"
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" deploy
